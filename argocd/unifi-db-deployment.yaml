apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unifi-db
  template:
    metadata:
      labels:
        app: unifi-db
    spec:
      containers:
        - name: mongo
          image: docker.io/mongo:8.2.5
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            privileged: true
          env:
            - name: MONGO_AUTHSOURCE
              value: admin
            - name: MONGODB_DBNAME
              value: unifi
            - name: MONGODB_PASS
              valueFrom:
                secretKeyRef:
                  name: unifi-mongo-credentials
                  key: password
            - name: MONGODB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: unifi-mongo-credentials
                  key: password
            - name: MONGODB_ROOT_USERNAME
              value: root
            - name: MONGODB_USER
              value: unifi
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
            - name: mongo-init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      # initContainers:
      #   - name: fix-permissions
      #     image: docker.io/mongo:8.2.5
      #     securityContext:
      #       runAsUser: 0
      #       runAsGroup: 0
      #       privileged: true
      #     command:
      #       - /bin/bash
      #       - -c
      #       - |
      #         echo "[DEBUG] fix-permissions initContainer started as user $(id -u):$(id -g)."
      #         echo "[DEBUG] Current ownership in /bitnami/mongodb:"
      #         ls -la /bitnami/mongodb || true
      #         echo "[DEBUG] Setting everything wide open with chown/chmod."
      #         chown -R root:root /bitnami/mongodb || true
      #         chmod -R 0777 /bitnami/mongodb || true
      #         echo "[DEBUG] Post-chown/chmod listing:"
      #         ls -la /bitnami/mongodb
      #         echo "[DEBUG] fix-permissions complete. Next container..."
      #     volumeMounts:
      #       - name: mongo-data
      #         mountPath: /bitnami/mongodb
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
        - name: mongo-init-scripts
          configMap:
            name: mongo-init-grant
            items:
              - key: init-mongo.sh
                path: init-mongo.sh